<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jebi</title>
  <meta name="description" content="Jebi의 링크 모음" />

  <!-- Open Graph (SNS 공유용) -->
  <meta property="og:title" content="Jebi" />
  <meta property="og:description" content="Jebi의 링크 모음" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jebi.xyz" />
  <!-- og:image는 나중에 이미지 올리면 교체 -->
  <!-- <meta property="og:image" content="https://jebi.xyz/og.png" /> -->

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Jebi" />
  <meta name="twitter:description" content="Jebi의 링크 모음" />

  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(800px 500px at 20% 10%, rgba(120,120,255,.10), transparent 60%),
        radial-gradient(800px 500px at 80% 0%, rgba(80,255,200,.08), transparent 55%),
        #0b0b0c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }

    .wrap {
      width: min(560px, 92vw);
      padding: 42px 0;
    }

    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      padding: 26px 18px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }

    .top {
      display: grid;
      place-items: center;
      text-align: center;
      margin-bottom: 18px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      margin-bottom: 14px;
      position: relative;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none; /* 이미지 넣으면 JS로 보이게 */
    }

    .avatar .initial {
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.02em;
      opacity: .95;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .bio {
      margin: 8px 0 0;
      font-size: 14px;
      color: rgba(255,255,255,.72);
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    a.link {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    a.link:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.18);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      flex: 0 0 auto;
    }

    .text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .title {
      font-weight: 750;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub {
      font-size: 12px;
      color: rgba(255,255,255,.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      opacity: .55;
      flex: 0 0 auto;
      font-size: 16px;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.45);
    }

    .mini {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
    }

    .pill {
      font-size: 12px;
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      padding: 8px 10px;
      border-radius: 999px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <header class="top">
        <div class="avatar" id="avatar">
          <!-- /avatar.jpg 를 나중에 넣으면 자동 표시 -->
          <img id="avatarImg" src="/avatar.jpg" alt="Jebi avatar" />
          <div class="initial" id="initial">J</div>
        </div>

        <h1>Jebi</h1>
        <p class="bio">Links / Projects / Social</p>

        <div class="mini">
          <span class="pill">https://jebi.xyz</span>
          <span class="pill">Updated: <span id="updated"></span></span>
        </div>
      </header>

      <nav class="links">
        <!-- ✅ 여기 링크만 너 실제 주소로 교체하면 됨 -->
        <a class="link" href="https://github.com/your-id" target="_blank" rel="noreferrer">
          <div class="left">
            <div class="icon">💻</div>
            <div class="text">
              <div class="title">GitHub</div>
              <div class="sub">코드 / 프로젝트</div>
            </div>
          </div>
          <div class="arrow">↗</div>
        </a>

        <a class="link" href="https://x.com/your-id" target="_blank" rel="noreferrer">
          <div class="left">
            <div class="icon">𝕏</div>
            <div class="text">
              <div class="title">X</div>
              <div class="sub">업데이트 / 생각</div>
            </div>
          </div>
          <div class="arrow">↗</div>
        </a>

        <a class="link" href="https://youtube.com/@your-id" target="_blank" rel="noreferrer">
          <div class="left">
            <div class="icon">📺</div>
            <div class="text">
              <div class="title">YouTube</div>
              <div class="sub">데모 / 기록</div>
            </div>
          </div>
          <div class="arrow">↗</div>
        </a>

        <a class="link" href="https://yourblog.com" target="_blank" rel="noreferrer">
          <div class="left">
            <div class="icon">📝</div>
            <div class="text">
              <div class="title">Blog</div>
              <div class="sub">글 / 노트</div>
            </div>
          </div>
          <div class="arrow">↗</div>
        </a>

        <a class="link" href="mailto:hello@jebi.xyz">
          <div class="left">
            <div class="icon">📩</div>
            <div class="text">
              <div class="title">Contact</div>
              <div class="sub">메일로 연락</div>
            </div>
          </div>
          <div class="arrow">↗</div>
        </a>
      </nav>

      <div class="footer">© <span id="y"></span> Jebi</div>
    </section>
  </main>

  <script>
    // 연도
    document.getElementById("y").textContent = new Date().getFullYear();

    // Updated 날짜(간단히 오늘 날짜 표시)
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    document.getElementById("updated").textContent = `${yyyy}-${mm}-${dd}`;

    // avatar.jpg가 존재하면 이미지 보여주고, 없으면 이니셜 유지
    const img = document.getElementById("avatarImg");
    img.addEventListener("load", () => {
      img.style.display = "block";
      document.getElementById("initial").style.display = "none";
    });
    img.addEventListener("error", () => {
      img.style.display = "none";
      document.getElementById("initial").style.display = "block";
    });
  </script>
</body>
</html>
